name: spark_autoclicker
description: Professional Autoclicker for Walmart Spark App.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.1
  firebase_database: ^11.0.1
  flutter_dotenv: ^6.0.1
  decimal: ^3.2.4
  provider: ^6.1.2
  google_fonts: ^8.1.0
  device_info_plus: ^13.1.0
  shared_preferences: ^2.3.2
  package_info_plus: ^10.1.0
  intl: ^0.19.0
  flutter_overlay_window: ^0.5.0
  url_launcher: ^6.3.1
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.5
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "public/images/SPARK-LOGO-BIG.png"
  min_sdk_android: 21
  adaptive_icon_background: "#020E21"
  adaptive_icon_foreground: "public/images/SPARK-LOGO-BIG.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - public/images/
