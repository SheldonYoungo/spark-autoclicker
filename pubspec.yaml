name: spark_autoclicker
description: Professional Autoclicker for Walmart Spark App.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.1
  firebase_database: ^11.0.1
  flutter_dotenv: ^6.0.1
  decimal: ^3.2.4
  provider: ^6.1.2
  google_fonts: ^8.1.0
  device_info_plus: ^13.1.0
  package_info_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - .env
